name: Mirror gated model

on:
  workflow_dispatch:
    inputs:
      model:
        description: HuggingFace model ID
        required: true
        type: choice
        options:
          - LiquidAI/LFM2.5-0.4B-Instruct-ONNX
          - LiquidAI/LFM2.5-1.2B-Instruct-ONNX

# Release tag: last path segment + "-q4"  e.g. LFM2.5-0.4B-Instruct-ONNX-q4
# Files uploaded flat (no onnx/ prefix) so mirrorBaseUrl works as a plain base URL.

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Derive release tag
        id: meta
        run: |
          SLUG="${{ inputs.model }}"
          TAG="${SLUG##*/}-q4"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Mirroring $SLUG -> release $TAG"

      - name: Download model files from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          BASE="https://huggingface.co/${{ inputs.model }}/resolve/main"
          mkdir dl

          for FILE in config.json tokenizer.json tokenizer_config.json generation_config.json; do
            echo "Downloading $FILE..."
            curl -fsSL -H "Authorization: Bearer $HF_TOKEN" "$BASE/$FILE" -o "dl/$FILE" \
              || echo "Skipping $FILE (not found)"
          done

          echo "Downloading onnx/model_q4.onnx..."
          curl -fL --retry 3 -H "Authorization: Bearer $HF_TOKEN" \
            "$BASE/onnx/model_q4.onnx" -o dl/model_q4.onnx

          echo "Downloading onnx/model_q4.onnx_data..."
          curl -fL --retry 3 -H "Authorization: Bearer $HF_TOKEN" \
            "$BASE/onnx/model_q4.onnx_data" -o dl/model_q4.onnx_data

          ls -lh dl/

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release create "$TAG" dl/* \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.model }} (q4)" \
            --notes "Mirror of ${{ inputs.model }} q4 — files served flat, no onnx/ prefix. Use mirrorBaseUrl: https://github.com/${{ github.repository }}/releases/download/$TAG"
