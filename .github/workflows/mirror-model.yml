name: Mirror gated model

on:
  workflow_dispatch:
    inputs:
      model:
        description: HuggingFace model ID
        required: true
        type: choice
        options:
          - LiquidAI/LFM2.5-0.4B-Instruct-ONNX
          - LiquidAI/LFM2.5-1.2B-Instruct-ONNX

# Release tag format: last path segment + "-q4"
# e.g. LFM2.5-0.4B-Instruct-ONNX-q4
# Files are uploaded flat (no onnx/ subdirectory) so the SDK can fetch them
# via a plain base URL: ${baseUrl}/model_q4.onnx, ${baseUrl}/config.json, etc.

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Derive release tag
        id: meta
        run: |
          SLUG="${{ inputs.model }}"
          TAG="${SLUG##*/}-q4"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Mirroring $SLUG → release $TAG"

      - name: Download model files from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          BASE="https://huggingface.co/${{ inputs.model }}/resolve/main"
          AUTH="Authorization: Bearer $HF_TOKEN"
          mkdir dl

          for FILE in config.json tokenizer.json tokenizer_config.json generation_config.json; do
            echo "Downloading $FILE…"
            curl -fsSL -H "$AUTH" "$BASE/$FILE" -o "dl/$FILE" || echo "Skipping $FILE (not found)"
          done

          echo "Downloading onnx/model_q4.onnx…"
          curl -fL --retry 3 -H "$AUTH" "$BASE/onnx/model_q4.onnx" -o dl/model_q4.onnx

          echo "Downloading onnx/model_q4.onnx_data…"
          curl -fL --retry 3 -H "$AUTH" "$BASE/onnx/model_q4.onnx_data" -o dl/model_q4.onnx_data

          ls -lh dl/

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git -c "url.https://${{ secrets.GITHUB_TOKEN }}@github.com/.insteadOf=https://github.com/" \
            ls-remote --tags origin "refs/tags/$TAG" | \
            xargs -r -I {} git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Create release and upload files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          MODEL="${{ inputs.model }}"
          REPO="${{ github.repository }}"

          python3 - <<EOF
          import os, textwrap
          tag   = os.environ["TAG"]
          model = os.environ["MODEL"]
          repo  = os.environ["REPO"]
          notes = textwrap.dedent(f"""
            Mirror of [{model}](https://huggingface.co/{model}) — q4 quantization.

            Files are served flat (no \`onnx/\` subdirectory). Use \`mirrorBaseUrl\` in model options:

            \`\`\`ts
            LFM2ForCausalLM.fromHub('{model}', {{
              mirrorBaseUrl: 'https://github.com/{repo}/releases/download/{tag}',
            }})
            \`\`\`

            > Verify the [LFM1.0 license](https://huggingface.co/{model}/blob/main/LICENSE) permits redistribution before using this mirror.
          """).strip()
          with open("notes.md", "w") as f:
              f.write(notes)
          EOF

          gh release create "$TAG" dl/* \
            --repo "$REPO" \
            --title "$MODEL (q4)" \
            --notes-file notes.md
