<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>transformers-js latency benchmark</title>
<style>
  body { font-family: monospace; max-width: 640px; margin: 40px auto; padding: 0 16px; background: #0d1117; color: #e6edf3; }
  h1 { font-size: 1rem; color: #58a6ff; margin: 0 0 24px; }
  #log { white-space: pre; line-height: 1.6; font-size: 0.85rem; }
  .pass { color: #3fb950; }
  .fail { color: #f85149; }
  .dim  { color: #8b949e; }
  .bold { font-weight: bold; }
</style>
<!-- importmap: resolves onnxruntime-web to the WebGPU-enabled CDN build -->
<script type="importmap">
{
  "imports": {
    "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.bundle.min.mjs"
  }
}
</script>
</head>
<body>
<h1>transformers-js · latency benchmark</h1>
<div id="log"></div>

<script type="module">
import { initRuntime, ViTForImageClassification } from "./dist/latency.js";

const MODEL      = "Xenova/vit-base-patch16-224";
const QUANTIZED  = true;   // onnx/model_quantized.onnx (~85MB vs ~350MB)
const RUNS    = 20;   // warm iterations
const WARMUP  = 3;    // iterations discarded

const el = document.getElementById("log");
function log(msg, cls = "") {
    el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

// Synthetic 640×480 image (HWC float32, values 0-255)
function syntheticImage(w, h) {
    const data = new Float32Array(w * h * 3);
    for (let y = 0; y < h; y++)
        for (let x = 0; x < w; x++) {
            const i = (y * w + x) * 3;
            data[i]     = y % 256;
            data[i + 1] = x % 256;
            data[i + 2] = (x + y) % 256;
        }
    return { data, width: w, height: h, channels: 3 };
}

function percentile(sorted, p) {
    const idx = Math.floor(p / 100 * sorted.length);
    return sorted[Math.min(idx, sorted.length - 1)];
}

async function run() {
    log("Initializing runtime...", "dim");
    const { device } = await initRuntime("webgpu");
    log(`  device: ${device}`, device === "webgpu" ? "pass" : "fail");

    log("\nLoading ViT-B/16 (includes model download on first run)...", "dim");
    const t0 = performance.now();
    const model = await ViTForImageClassification.fromHub(MODEL, { device, quantized: QUANTIZED });
    const loadMs = performance.now() - t0;
    log(`  loaded in ${loadMs.toFixed(0)} ms`, "dim");

    const image = syntheticImage(640, 480);

    log(`\nWarmup (${WARMUP} iterations)...`, "dim");
    for (let i = 0; i < WARMUP; i++) {
        await model.run(image);
        log(`  warmup ${i + 1}/${WARMUP}`, "dim");
    }

    log(`\nBenchmark (${RUNS} iterations)...`, "dim");
    const times = [];
    for (let i = 0; i < RUNS; i++) {
        const t = performance.now();
        await model.run(image);
        times.push(performance.now() - t);
        log(`  run ${String(i + 1).padStart(2)}/${RUNS}  ${times.at(-1).toFixed(1)} ms`, "dim");
    }

    times.sort((a, b) => a - b);
    const median = percentile(times, 50);
    const p95    = percentile(times, 95);
    const min    = times[0];
    const max    = times.at(-1);

    const CRITERION = 50; // ms
    const pass = median <= CRITERION;

    log("\n─────────────────────────────────────────");
    log(`Model:   ${MODEL} (${QUANTIZED ? "quantized" : "float32"})`);
    log(`Device:  ${device}`);
    log(`Runs:    ${RUNS} (after ${WARMUP} warmup)`);
    log("");
    log(`Median:  ${median.toFixed(1)} ms  ${pass ? "✓" : "✗"}  criterion ≤${CRITERION} ms`, pass ? "pass bold" : "fail bold");
    log(`p95:     ${p95.toFixed(1)} ms`);
    log(`Min/Max: ${min.toFixed(1)} / ${max.toFixed(1)} ms`);
    log("─────────────────────────────────────────");

    model.dispose();
}

run().catch((err) => {
    log(`\nError: ${err.message}`, "fail");
    console.error(err);
});
</script>
</body>
</html>
